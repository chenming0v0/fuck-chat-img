<html lang="zh">
  <head>

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2.97 12.92A2 2 0 0 0 2 14.63v3.24a2 2 0 0 0 .97 1.71l3 1.8a2 2 0 0 0 2.06 0L12 19v-5.5l-5 3-5-2.58Z'/%3E%3Cpath d='m7 16.5-5-3.58'/%3E%3Cpath d='m12 13.5 5 3 5-2.58'/%3E%3Cpath d='M21.03 12.92A2 2 0 0 1 22 14.63v3.24a2 2 0 0 1-.97 1.71l-3 1.8a2 2 0 0 1-2.06 0L12 19'/%3E%3Cpath d='M7 16.5V9.5l5-3 5 3v7'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Fuck Chat Img</title>
    <script>
      // 首屏前同步应用主题, 避免 dark 主题用户刷新时先看到一帧 light 主题(FOUC)
      // 同时设置 html.dark(Tailwind/自定义CSS) 和 html[theme-mode](Semi UI CSS 变量),
      // 否则 Semi UI 组件仍会闪一帧亮色
      (function () {
        try {
          var t = localStorage.getItem('fci_theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('theme-mode', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>需要启用 JavaScript 才能运行本应用。</noscript>
    <div id="root"></div>
  </body>
</html>
